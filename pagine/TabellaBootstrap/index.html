<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestione Studenti</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
    }
    .card-header {
      background-color: #1a73e8;
      color: white;
    }
    .table thead {
      background-color: #343a40;
      color: white;
    }
    .btn-aggiungi {
      background-color: #28a745;
      color: white;
      border: none;
    }
    .btn-aggiungi:hover {
      background-color: #218838;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-header py-3">
        <h2 class="mb-0 fw-bold">Gestione Studenti</h2>
      </div>
      <div class="card-body">
        <!-- Input fields -->
        <div class="row g-2 mb-4 align-items-center">
          <div class="col-md-4">
            <input type="text" id="nome" class="form-control" placeholder="Nome"/>
          </div>
          <div class="col-md-4">
            <input type="text" id="cognome" class="form-control" placeholder="Cognome"/>
          </div>
          <div class="col-md-2">
            <input type="number" id="eta" class="form-control" placeholder="Età"/>
          </div>
          <div class="col-md-2">
            <button class="btn btn-aggiungi w-100" onclick="aggiungiStudente()">Aggiungi</button>
          </div>
        </div>
        <div id="errore" class="alert alert-danger d-none" role="alert">
          Compila tutti i campi prima di aggiungere uno studente.
        </div>

        <!-- Table -->
        <table class="table table-bordered table-hover">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Cognome</th>
              <th>Età</th>
              <th>Azione</th>
            </tr>
          </thead>
          <tbody id="tabellaBody">
          </tbody>
        </table>
        <p id="vuoto" class="text-muted fst-italic">Nessuno studente aggiunto.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
